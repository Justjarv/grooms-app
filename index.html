// PROFILE SCREEN
// ═══════════════════════════════════════════
function ProfileScreen({ user, weddingStyle, onNav, onSignOut }) {
  const roleLabel = user.role === 'groom' ? 'Organizer' : user.role === 'bride' ? 'Partner' : 'Groomsman';
  const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase();
  return (
    <div className="screen-scroll" style={{ padding: '0 20px 20px' }}>
      <div style={{ paddingTop: 16, marginBottom: 20 }}>
        <div onClick={() => onNav('home')} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 16, fontWeight: 500 }}>← Back</div>
      </div>
      <div style={{ textAlign: 'center', marginBottom: 24 }}>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--surface-dark)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px', color: 'var(--accent)', fontSize: 22, fontWeight: 800 }}>{initials}</div>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: -0.5 }}>{user.name || 'User'}</h2>
        <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>{user.email || 'email@example.com'}</p>
        <span style={{ display: 'inline-block', marginTop: 6, fontSize: 10, fontWeight: 700, padding: '3px 10px', borderRadius: 2, background: 'var(--accent-bg)', color: 'var(--accent-text)' }}>{roleLabel.toUpperCase()}</span>
      </div>

      {weddingStyle && (
        <>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>EVENT SETTINGS</div>
          <div className="card" style={{ marginBottom: 16, padding: '14px' }}>
            {weddingStyle.colors?.length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                <span style={{ color: 'var(--text-muted)', fontSize: 11, fontWeight: 500 }}>Colors:</span>
                {weddingStyle.colors.map((hex, i) => <div key={i} style={{ width: 20, height: 20, borderRadius: 4, background: hex, border: hex === '#FFFFF0' ? '1px solid var(--border)' : 'none' }} />)}
              </div>
            )}
            {weddingStyle.dressCode && <div style={{ color: 'var(--text-secondary)', fontSize: 13 }}>Dress code: {weddingStyle.dressCode}</div>}
          </div>
        </>
      )}

      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>APP</div>
      {['About GROOMS.', 'Rate the App', 'Send Feedback'].map((item, i) => (
        <div key={i} className="card" style={{ marginBottom: 6, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px', cursor: 'pointer' }}>
          <span style={{ color: 'var(--text-primary)', fontSize: 14, fontWeight: 500 }}>{item}</span>
          <span style={{ color: 'var(--text-dim)', fontSize: 14 }}>→</span>
        </div>
      ))}

      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10, marginTop: 16 }}>ACCOUNT</div>
      <div className="card" onClick={onSignOut} style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '14px', border: '1px solid var(--danger)' }}>
        <span style={{ color: 'var(--danger)', fontSize: 14, fontWeight: 600 }}>Sign Out</span>
      </div>
      <p style={{ color: 'var(--text-dim)', fontSize: 11, textAlign: 'center', marginTop: 16 }}>GROOMS. v1.0 — Prototype</p>
    </div>
  );
}

// ═══════════════════════════════════════════
// PLAN TAB — Ideas + Shop
// ═══════════════════════════════════════════
function PlanScreen({ onNav, onCreateEvent, activeEvent, isGroom, user, isBride, groomsmenReqs, isWedding, isGroomsman, initialSubTab, subEvents = [], onAddSubEvent }) {
  const [subTab, setSubTab] = useState(initialSubTab || 'ideas');
  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: '1 1 0', minHeight: 0 }}>
      {/* Header + Sub-tabs */}
      <div style={{ padding: '16px 20px 0', background: 'var(--bg-primary)', zIndex: 5, flexShrink: 0 }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--text-primary)', fontWeight: 700, letterSpacing: -0.5, marginBottom: 12 }}>Plan</h2>
        <div style={{ display: 'flex', background: 'var(--bg-secondary)', borderRadius: 4, padding: 3, marginBottom: 12 }}>
          {[
            { key: 'ideas', label: isGroomsman ? 'Events' : 'Ideas' },
            { key: 'shop', label: 'Shop' }
          ].map(t => (
            <div key={t.key} onClick={() => { setSubTab(t.key); window.gTrack('plan_subtab', {tab: t.key}); }} style={{
              flex: 1, textAlign: 'center', padding: '10px 0', borderRadius: 2, fontSize: 14, fontWeight: 600, cursor: 'pointer',
              background: subTab === t.key ? 'var(--surface-dark)' : 'transparent',
              color: subTab === t.key ? '#FAFAF9' : 'var(--text-muted)', transition: '0.2s'
            }}>
              {t.label}
            </div>
          ))}
        </div>
      </div>
      {/* Sub-tab content */}
      {subTab === 'ideas' ? (
        <EventsScreen onNav={onNav} onCreateEvent={onCreateEvent} activeEvent={activeEvent} isGroom={isGroom} user={user} isBride={isBride} subEvents={subEvents} onAddSubEvent={onAddSubEvent} />
      ) : (
        <MarketplaceScreen groomsmenReqs={groomsmenReqs} isWedding={isWedding} isGroomsman={isGroomsman} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const [screen, setScreenRaw] = useState('splash'); // splash | landing | auth | onboarding | main
  const setScreen = (s) => { setScreenRaw(s); window.gTrack('screen_changed', {screen: s}); };
  const [authInitialTab, setAuthInitialTab] = useState('signup');
  const [tabRaw, setTabRaw] = useState('home');
  const tab = tabRaw;
  const setTab = (t) => { setTabRaw(t); window.gTrack('tab_viewed', {tab: t}); };
  const [user, setUser] = useState({ name: '', email: '', role: 'groom', eventType: 'wedding', partnerName: '', eventDate: '', location: 'Nashville, TN' });
  const [activeEvent, setActiveEvent] = useState(null);
  const [crewInvited, setCrewInvited] = useState(false);
  const [weddingStyle, setWeddingStyle] = useState(null);
  const [groomsmenReqs, setGroomsmenReqs] = useState(['tux', 'shoes', 'rsvp']);
  const [showStyleConfig, setShowStyleConfig] = useState(false);
  const [subEvents, setSubEvents] = useState([]);

  const handleAuthComplete = (authData) => {
    setUser(prev => ({ ...prev, name: authData.name || prev.name, email: authData.email }));
    setScreen('onboarding');
  };

  const handleOnboardingComplete = (userData) => {
    const { weddingStyle: style, crewInvited: crewWasInvited, groomsmenReqs: reqs, brideCanSeeFinances: brideFinance, ...userFields } = userData;
    setUser(prev => ({ ...prev, ...userFields }));
    if (style) setWeddingStyle(style);
    if (reqs) setGroomsmenReqs(reqs);
    if (crewWasInvited) setCrewInvited(true);
    if (brideFinance !== undefined) setBrideCanSeeFinances(brideFinance);
    // Seed default sub-events for weddings
    if ((userFields.eventType || 'wedding') === 'wedding' && userFields.eventDate) {
      const ed = userFields.eventDate;
      setSubEvents([
        { id: 'default-1', name: 'Day-Of Photos', date: ed, time: '14:00', location: 'Venue Gardens', description: 'First look & wedding party portraits', createdBy: userFields.name || 'Organizer' },
        { id: 'default-2', name: 'Ceremony', date: ed, time: '16:00', location: 'Main Chapel', description: 'The main event — vows, rings, and I dos', createdBy: userFields.name || 'Organizer' },
        { id: 'default-3', name: 'Cocktail Hour & Reception', date: ed, time: '17:30', location: 'Grand Ballroom', description: 'Dinner, toasts, first dance, and celebration', createdBy: userFields.name || 'Organizer' },
        { id: 'default-4', name: 'Send-Off', date: ed, time: '22:00', location: 'Front Steps', description: 'Sparkler exit and farewell', createdBy: userFields.name || 'Organizer' },
      ]);
    }
    setScreen('main');
  };

  const [cardIssued, setCardIssued] = useState(false);
  const [pastEvents, setPastEvents] = useState([]);
  const [brideCanSeeFinances, setBrideCanSeeFinances] = useState(false);
  const [events, setEvents] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [showNotifications, setShowNotifications] = useState(false);

  // Seed notifications based on state
  useEffect(() => {
    const notifs = [{ id: 'welcome', title: 'Welcome to GROOMS.', desc: 'Your event concierge is ready.', time: 'Just now', type: 'info', read: false }];
    if (crewInvited) {
      notifs.unshift({ id: 'n1', title: 'Jake Wilson accepted', desc: 'Best Man is in.', time: '2h ago', type: 'success', read: false });
      notifs.unshift({ id: 'n2', title: 'Ryan Chen accepted', desc: 'Groomsman is in.', time: '1h ago', type: 'success', read: false });
      notifs.unshift({ id: 'n3', title: 'Tom Rodriguez — 100%', desc: 'All tasks complete.', time: '15m ago', type: 'accent', read: false });
    }
    if (activeEvent) {
      notifs.unshift({ id: 'n4', title: 'Event locked in!', desc: `${activeEvent.name} is confirmed.`, time: '10m ago', type: 'accent', read: false });
    }
    setNotifications(notifs);
  }, [crewInvited, activeEvent]);

  const handleCreateEvent = (event) => {
    const newEvent = { ...event, id: Date.now(), status: 'active', createdAt: new Date().toISOString() };
    setEvents(prev => [...prev, newEvent]);
    setActiveEvent(newEvent);
    if (event.splitCosts && !cardIssued) setCardIssued(true);
    window.gTrack('event_created', {name: event.name, splitCosts: event.splitCosts, eventType: event.eventType});
    setTab('home');
  };

  const handleStyleSave = (style) => {
    setWeddingStyle(style);
    setShowStyleConfig(false);
    setTab('home');
  };

  const handleStyleSkip = () => {
    setShowStyleConfig(false);
    setTab('home');
  };

  const isGroom = user.role === 'groom';
  const isGroomsman = user.role === 'groomsman';
  const isBride = user.role === 'bride';
  const isOrganizer = isGroom || isBride;

  const [planSubTab, setPlanSubTab] = useState('ideas');

  const renderMain = () => {
    if (isGroomsman) {
      switch (tab) {
        case 'home': return <GroomsmanDashboard user={user} onNav={setTab} groomsmenReqs={groomsmenReqs} weddingStyle={weddingStyle} activeEvent={activeEvent} />;
        case 'plan': return <PlanScreen onNav={setTab} onCreateEvent={handleCreateEvent} activeEvent={activeEvent} isGroom={false} user={user} isBride={false} groomsmenReqs={groomsmenReqs} isWedding={user.eventType === 'wedding'} isGroomsman={true} initialSubTab={planSubTab} />;
        case 'chat': return <ChatScreen user={user} />;
        case 'eventDetail': return activeEvent ? <EventDetailScreen event={activeEvent} user={user} onNav={setTab} cardIssued={false} crewInvited={true} /> : <GroomsmanDashboard user={user} onNav={setTab} groomsmenReqs={groomsmenReqs} weddingStyle={weddingStyle} activeEvent={activeEvent} />;
        case 'profile': return <ProfileScreen user={user} weddingStyle={weddingStyle} onNav={setTab} onSignOut={() => { setScreenRaw('splash'); setTab('home'); }} />;
        default: return <GroomsmanDashboard user={user} onNav={setTab} groomsmenReqs={groomsmenReqs} weddingStyle={weddingStyle} activeEvent={activeEvent} />;
      }
    }
    if (showStyleConfig) {
      return <StyleConfigScreen isGroom={isGroom} onSave={handleStyleSave} onSkip={handleStyleSkip} existingStyle={weddingStyle} />;
    }
    switch (tab) {
      case 'home': return <HomeScreen user={user} onNav={setTab} isGroom={isGroom || isBride} activeEvent={activeEvent} crewInvited={crewInvited} weddingStyle={weddingStyle} groomsmenReqs={groomsmenReqs} onEditStyle={() => setShowStyleConfig(true)} cardIssued={cardIssued} pastEvents={pastEvents} isBride={isBride} subEvents={subEvents} notifications={notifications} onMarkNotifRead={(id) => setNotifications(prev => prev.map(n => id === 'all' ? {...n, read: true} : n.id === id ? {...n, read: true} : n))} events={events} />;
      case 'plan': return <PlanScreen onNav={setTab} onCreateEvent={handleCreateEvent} activeEvent={activeEvent} isGroom={isGroom} user={user} isBride={isBride} groomsmenReqs={groomsmenReqs} isWedding={user.eventType === 'wedding'} isGroomsman={false} initialSubTab={planSubTab} subEvents={subEvents} onAddSubEvent={(evt) => setSubEvents(prev => [...prev, evt])} />;
      case 'timeline': return <TimelineScreen subEvents={subEvents} onAddEvent={(evt) => setSubEvents(prev => [...prev, evt])} user={user} weddingDate={user.eventDate} onNav={setTab} />;
      case 'eventDetail': return <EventDetailScreen event={activeEvent} user={user} onNav={setTab} cardIssued={cardIssued} crewInvited={crewInvited} />;
      case 'card': return <CardScreen user={user} activeEvent={activeEvent} />;
      case 'chat': return <ChatScreen user={user} />;
      case 'crew': return <CrewScreen isGroom={isGroom || isBride} eventType={activeEvent ? activeEvent.eventType : user.eventType} onInviteSent={() => setCrewInvited(true)} crewInvited={crewInvited} activeEvent={activeEvent} onNav={setTab} />;
      case 'profile': return <ProfileScreen user={user} weddingStyle={weddingStyle} onNav={setTab} onSignOut={() => { setScreenRaw('splash'); setTab('home'); }} />;
      default: return <HomeScreen user={user} onNav={setTab} isGroom={isGroom || isBride} activeEvent={activeEvent} crewInvited={crewInvited} weddingStyle={weddingStyle} groomsmenReqs={groomsmenReqs} onEditStyle={() => setShowStyleConfig(true)} cardIssued={cardIssued} pastEvents={pastEvents} isBride={isBride} subEvents={subEvents} notifications={notifications} onMarkNotifRead={(id) => setNotifications(prev => prev.map(n => id === 'all' ? {...n, read: true} : n.id === id ? {...n, read: true} : n))} events={events} />;
    }
  };

  return (
    <div className="phone-frame">
      {screen === 'splash' && <SplashScreen onGetStarted={() => setScreen('landing')} onSignIn={() => { setAuthInitialTab('signin'); setScreen('auth'); }} />}
      {screen === 'landing' && <LandingScreen onComplete={() => setScreen('auth')} onSkip={() => setScreen('auth')} />}
      {screen === 'auth' && <AuthScreen onComplete={handleAuthComplete} initialTab={authInitialTab} />}
      {screen === 'onboarding' && <OnboardingScreen onComplete={handleOnboardingComplete} initialName={user.name} />}
      {screen === 'main' && (
        <div className="screen">
          <StatusBar />
          {renderMain()}
          <BottomNav active={tab} onNav={setTab} hasCard={cardIssued && (!isBride || brideCanSeeFinances)} isGroomsman={isGroomsman} isBride={isBride} notifCount={notifications.filter(n => !n.read).length} />
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
