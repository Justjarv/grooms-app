:root {
  /* ── Lane A · Bone Flow (light surfaces) ── */
  --bg-primary: #EAE0CC;       /* Bone */
  --bg-secondary: #F2EBD9;     /* Bone/Soft — elevated/hover */
  --bg-card: #F2EBD9;          /* Bone/Soft — card fill */
  --bg-elevated: #F2EBD9;      /* Bone/Soft */
  --border: #D8CCAD;           /* Bone/Deep — dividers */
  --border-light: #D8CCAD;     /* Bone/Deep */

  /* Accent — Loden green (light surfaces only) */
  --accent: #1F4D2C;           /* Loden — primary ink, CTAs */
  --accent-hover: #143420;     /* Loden/Deep — hover/press */
  --accent-muted: #1F4D2C;     /* Loden */
  --accent-bg: rgba(31,77,44,0.08);
  --accent-text: #EAE0CC;      /* Bone — text on Loden fills */

  /* Text — Bone flow */
  --text-primary: #1F4D2C;     /* Loden — headlines, body */
  --text-secondary: #1A1C18;   /* Ink — body when Loden too colored */
  --text-muted: #5A5A52;       /* Ink/Dim — secondary text */
  --text-dim: #5A5A52;         /* Ink/Dim */

  /* Semantic */
  --success: #1F4D2C;          /* Loden for confirmed */
  --success-bg: rgba(31,77,44,0.08);
  --warning: #D4A148;          /* Amber */
  --danger: #D27849;           /* Copper */
  --info: #6EC6E0;             /* Crystal */

  /* ── Lane B · Obsidian Insert (dark pockets) ── */
  --surface-dark: #08090B;     /* Obsidian */
  --surface-dark-secondary: #14161A; /* Graphite */
  --border-dark: #232730;      /* Steel */

  /* Dark insert text */
  --bone-on-dark: #EAE0CC;     /* Bone/On-Dark */
  --dim-on-dark: #8E8B7E;      /* Dim/On-Dark */
  --phosphor: #B8E986;         /* Signal/data accent — DARK ONLY */
  --crystal: #6EC6E0;          /* Secondary data accent — DARK ONLY */
  --copper: #D27849;           /* Alert, decline — both surfaces */
  --amber: #D4A148;            /* Warning — both surfaces */

  /* Shadows — muted on tan */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.10);

  /* Radius — sharp, no pills */
  --radius-sm: 2px;
  --radius-md: 2px;
  --radius-lg: 4px;
  --radius-xl: 4px;
  --radius-full: 2px;          /* No pills — 2px for buttons */

  /* Typography families */
  --font-display: 'Big Shoulders Display', sans-serif;

}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
html { overscroll-behavior: none; }
html, body, #root { height: 100%; height: 100vh; height: 100dvh; width: 100%; }
@media (min-width: 501px) { html, body, #root { overflow: auto; } }
@media (max-width: 500px) { html, body, #root { overflow: hidden; } }
body { font-family: var(--font-body); background: #D8CCAD; margin: 0; }

/* Phone frame for desktop */
.phone-frame {
  width: 390px; height: min(844px, calc(100vh - 40px));
  background: var(--bg-primary);
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.15);
  margin: 20px auto;
}
@media (max-width: 500px) {
  .phone-frame { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; margin: 0; padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); }
  body { background: var(--bg-primary); }
}
.phone-frame { border-radius: 32px; }
@media (max-width: 500px) { .phone-frame { border-radius: 0; } }

.screen { height: 100%; max-height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.screen-scroll { flex: 1 1 0; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; height: 0; padding-bottom: 8px; }
.screen-scroll::-webkit-scrollbar { display: none; }

/* Status bar — desktop shows fake notch, mobile uses real status bar */
.status-bar { height: 54px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; background: var(--bg-primary); position: relative; z-index: 10; flex-shrink: 0; }
.notch { width: 126px; height: 34px; background: #1A1C18; border-radius: 0 0 20px 20px; }
@media (max-width: 500px) {
  .status-bar { height: max(20px, env(safe-area-inset-top, 20px)); padding: 0; }
  .notch { display: none; }
}
/* Standalone PWA mode — minimal status bar since OS handles it */
@media (display-mode: standalone) {
  .status-bar { height: env(safe-area-inset-top, 0px); padding: 0; }
  .notch { display: none; }
}

/* Bottom nav — Bone fill, JBM caps labels */
.bottom-nav { display: flex; background: var(--bg-primary); border-top: 1px solid var(--border); padding: 8px 0 28px; flex-shrink: 0; flex-grow: 0; z-index: 10; position: relative; }
@media (max-width: 500px) {
  .bottom-nav { padding-bottom: max(28px, env(safe-area-inset-bottom, 28px)); }

.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-muted); }
.nav-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); font-weight: 400; text-transform: uppercase; letter-spacing: 0.18em; }
.nav-item.active .nav-label { color: var(--text-primary); font-weight: 500; }
.nav-item.active .nav-icon { color: var(--text-primary); }

/* Buttons — Loden fill, 2px radius, JBM caps, no pills */
.btn-primary { background: var(--accent); color: var(--accent-text); border: none; padding: 14px 28px; border-radius: 2px; font-size: 11px; font-weight: 500; cursor: pointer; width: 100%; transition: all 0.2s; font-family: var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; min-height: 48px; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.98); }
.btn-accent { background: var(--accent); color: var(--accent-text); border: none; padding: 14px 28px; border-radius: 2px; font-size: 11px; font-weight: 500; cursor: pointer; width: 100%; transition: all 0.2s; font-family: var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; min-height: 48px; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-accent:active { transform: scale(0.98); }

.btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 2px; font-size: 11px; font-weight: 500; cursor: pointer; width: 100%; transition: all 0.2s; font-family: var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; }
.btn-secondary:hover { background: rgba(31,77,44,0.06); }
.btn-sm { padding: 8px 16px; font-size: 10px; width: auto; }

/* Cards — Bone/Soft fill, Bone/Deep border, sharp radius */
.card { background: var(--bg-card); border-radius: 4px; padding: 16px; border: 1px solid var(--border); box-shadow: none; }

/* Input — Bone/Soft fill, Bone/Deep border, Loden focus */
.input-field { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 2px; padding: 14px 16px; color: var(--text-secondary); font-size: 16px; outline: none; font-family: var(--font-body); -webkit-appearance: none; appearance: none; }
.input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.input-field::placeholder { color: var(--text-muted); }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes metallicShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes progressFill {
  from { width: 0%; }
  to { width: 100%; }
}
@keyframes logoGlow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(31,77,44,0.3)); }
  50% { filter: drop-shadow(0 0 20px rgba(31,77,44,0.5)); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }

.fade-in { animation: fadeIn 0.3s ease-out; }
.slide-up { animation: slideUp 0.4s ease-out; }

.chat-bubble { border-radius: 4px; padding: 12px 16px; max-width: 85%; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease-out; }

.chat-user { background: var(--accent); color: var(--accent-text); align-self: flex-end; border-bottom-right-radius: 0; }

.toggle { width: 48px; height: 28px; border-radius: 4px; background: var(--border); cursor: pointer; position: relative; transition: 0.2s; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; width: 22px; height: 22px; border-radius: 2px; background: var(--bg-primary); position: absolute; top: 3px; left: 3px; transition: 0.2s; }
.toggle.on::after { left: 23px; }

/* Icon containers — sharp, Loden/Bone coded */
.icon-box { width: 36px; height: 36px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; font-family: var(--font-mono); letter-spacing: 0.05em; }
.icon-box-accent { background: var(--accent); color: var(--accent-text); }
.icon-box-muted { background: var(--bg-secondary); color: var(--text-muted); }
.icon-box-dark { background: var(--surface-dark); color: var(--bone-on-dark); }

/* Obsidian insert container */
.obsidian-insert { background: var(--surface-dark); border: 1px solid var(--border-dark); border-radius: 4px; padding: 24px; }
.obsidian-insert .data-tile { background: var(--surface-dark-secondary); border: 1px solid var(--border-dark); border-radius: 4px; padding: 16px; }

/* Status tags — outline pill, JBM caps */
.status-tag { display: inline-block; font-family: var(--font-mono); font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.18em; padding: 3px 8px; border-radius: 2px; border: 1px solid; }
.status-tag-confirmed { border-color: var(--accent); color: var(--accent); }
.status-tag-pending { border-color: var(--text-muted); color: var(--text-muted); }
.status-tag-declined { border-color: var(--copper); color: var(--copper); }

  budget: "Smart. I'll keep everything within budget. Here's a rough split:\n\nHotel: $189/night × 2 = $378 (split 4 ways = $95)\nActivities: $85/person\nDining: $120/person\n\nTotal: ~$300/person for 2 nights. Should I send this to the crew for a vote?",
  crew: "On it. Each one of the boys gets a link to join, see the plan, vote on stuff, and split costs. How many are we adding?",
  gifts: "Here are the top-rated groomsmen gifts in Discover:\n\nLeather Dopp Kit — $85 (personalized)\nCustom Flask Set — $120 (8-piece)\nGrooming Box — $65\n\nAll can be personalized with names. Want me to set up a gift list?",
  card: "The Ventura Onyx is a debit card funded by the crew. When they chip in, money loads straight to your card. Every transaction is visible to contributors in real time — full transparency. You can send expense reports anytime so nobody has to wonder where the money went.",
  payment: "Each of the boys gets a link to chip in. Money goes straight to your Ventura Onyx. Every deposit and every purchase is tracked and visible to the crew. Send expense reports from the card settings to keep everyone in the loop.",
  style: "You can set the wedding style rules from your home screen — colors, dress code, and specific attire notes. Once locked in, every crew member sees them when they open the app. Navy and champagne is popular this year. Want me to suggest a palette?",
  fallback: "This is a prototype and AI will be completed as part of the build.",
};

const AI_KEYWORDS = {
  bachelor: ["bachelor", "party", "weekend", "trip", "plan"],
  nashville: ["nashville", "venue", "where", "location", "place", "restaurant"],
  budget: ["budget", "cost", "price", "afford", "spend", "money", "per person"],
  crew: ["crew", "groomsmen", "invite", "guys", "friends", "group", "squad"],
  gifts: ["gift", "present", "groomsmen gift", "flask", "leather"],
  card: ["card", "debit", "onyx", "ventura", "spend"],
  payment: ["pay", "venmo", "split", "collect", "contribute", "chip in", "pool"],
  style: ["style", "dress code", "color", "attire", "suit", "tux", "outfit", "wear", "colors"],
};

function matchAI(input) {
  const lower = input.toLowerCase();
  for (const [key, words] of Object.entries(AI_KEYWORDS)) {
    if (words.some(w => lower.includes(w))) return AI_RESPONSES[key];
  }
  return AI_RESPONSES.fallback;
}

      const elapsed = Math.min((now - startTime) / 900, 1);
      setBal(Math.floor(elapsed * target));

// ── AUTH — Sign Up / Sign In ──
function AuthScreen({ onComplete, initialTab }) {
  const [authTab, setAuthTab] = useState(initialTab || 'signup');
  const [authName, setAuthName] = useState('');
  const [authEmail, setAuthEmail] = useState('');
  const [authPassword, setAuthPassword] = useState('');
  const [loading, setLoading] = useState(false);

  const handleAuth = () => {
    setLoading(true);
    const event = authTab === 'signup' ? 'auth_signup' : 'auth_signin';
    window.gTrack(event, { email: authEmail, name: authTab === 'signup' ? authName : undefined });
    // Identify the user in PostHog so signups appear in People with name + email attached.
    // Distinct ID is the email so the same user is recognized across sessions.
    try {
      if (window.posthog && posthog.identify) {
        const props = { email: authEmail };
        if (authTab === 'signup' && authName) props.name = authName;
        posthog.identify(authEmail, props, { $set: props });
      }
    } catch (e) { /* posthog blocked or not loaded — silently continue */ }
    setTimeout(() => {
      onComplete({ name: authTab === 'signup' ? authName : '', email: authEmail });
    }, 800);
  };

  const canSubmit = authTab === 'signup'
    ? authName && authEmail && authPassword
    : authEmail && authPassword;

  return (
    <div className="screen" style={{ background: 'var(--bg-primary)', padding: '0 28px' }}>
      <div style={{ paddingTop: 60, textAlign: 'center', marginBottom: 32 }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontSize: 44, fontWeight: 800, letterSpacing: -2, lineHeight: 1,
          color: 'var(--accent)', marginBottom: 6
        }}>G</div>
        <p style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)', fontSize: 10, fontWeight: 400, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
          {authTab === 'signup' ? "CREATE YOUR ACCOUNT" : "WELCOME BACK"}
        </p>
      </div>

      {/* Tabs — Bone/Soft bg, Loden active */}
      <div style={{ display: 'flex', background: 'var(--bg-secondary)', borderRadius: 2, padding: 3, marginBottom: 24, border: '1px solid var(--border)' }}>
        {['signup', 'signin'].map(t => (
          <div key={t} onClick={() => setAuthTab(t)} style={{
            flex: 1, textAlign: 'center', padding: '10px 0', borderRadius: 2, fontSize: 11, fontWeight: 500, cursor: 'pointer',
            fontFamily: 'var(--font-mono)', letterSpacing: '0.15em', textTransform: 'uppercase',
            background: authTab === t ? 'var(--accent)' : 'transparent',
            color: authTab === t ? 'var(--accent-text)' : 'var(--text-muted)', transition: '0.2s'
          }}>
            {t === 'signup' ? 'SIGN UP' : 'SIGN IN'}
          </div>
        ))}
      </div>

      <div className="fade-in" key={authTab}>
        {authTab === 'signup' && (
          <input className="input-field" placeholder="Your name" value={authName} onChange={e => setAuthName(e.target.value)}
            style={{ marginBottom: 12 }} />
        )}
        <input className="input-field" type="email" placeholder="Email" value={authEmail} onChange={e => setAuthEmail(e.target.value)}
          style={{ marginBottom: 12 }} />
        <input className="input-field" type="password" placeholder="Password" value={authPassword} onChange={e => setAuthPassword(e.target.value)}
          style={{ marginBottom: 24 }} />

        <button className="btn-primary" onClick={handleAuth} disabled={!canSubmit || loading}
          style={{ opacity: canSubmit && !loading ? 1 : 0.5 }}>
          {loading ? 'ONE SEC...' : authTab === 'signup' ? 'CREATE ACCOUNT →' : 'SIGN IN →'}
        </button>

        {/* Divider */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '20px 0' }}>
          <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
          <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)', fontSize: 10, letterSpacing: '0.15em' }}>OR</span>
          <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
        </div>

        <button onClick={handleAuth} className="btn-secondary" style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10
        }}>

          );
        })}
      </div>

      {selectedReqs.length > 0 && (
        <div className="fade-in" style={{ background: 'var(--bg-secondary)', borderRadius: 2, padding: '10px 14px', marginBottom: 20 }}>
          <div style={{ color: 'var(--text-muted)', fontSize: 11, fontWeight: 600, marginBottom: 4 }}>{selectedReqs.length} REQUIREMENT{selectedReqs.length !== 1 ? 'S' : ''} SELECTED</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
            {selectedReqs.map(key => {
              const req = GROOMSMEN_REQUIREMENTS.find(r => r.key === key);
              return <span key={key} style={{ fontSize: 10, fontWeight: 600, padding: '3px 8px', borderRadius: 2, background: 'var(--surface-dark)', color: 'var(--accent)' }}>{req?.label}</span>;
            })}
          </div>
        </div>
      )}

      <button className="btn-primary" onClick={() => setStep(6)}>Continue — Invite the Boys</button>
      <button className="btn-secondary" onClick={() => setStep(6)} style={{ marginTop: 8 }}>Skip — use defaults</button>
      <div style={{ height: 40 }} />
    </div>
  );

  // Wedding Step 6: Invite the Boys — dedicated, explains what they get
  const [crewEmails, setCrewEmails] = useState('');
  const [crewInviteSent, setCrewInviteSent] = useState(false);

  const weddingStep6 = (
    <div key="w6" className="fade-in" style={{ padding: '24px 24px 40px' }}>
      <div onClick={() => setStep(5)} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 16, fontWeight: 500 }}>← Back</div>
      <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 24, color: 'var(--text-primary)', marginBottom: 4, fontWeight: 700, letterSpacing: -0.5 }}>
        {isGroom ? "Get the boys in" : "Invite the groomsmen"}
      </h2>
      <p style={{ color: 'var(--text-muted)', marginBottom: 20, fontSize: 14 }}>
        {isGroom ? "This is the last step — once they're in, everyone's locked." : "Add the crew so they can start coordinating."}
      </p>

      {/* What they get access to */}
      <div className="card" style={{ marginBottom: 20, background: 'var(--surface-dark)', border: 'none' }}>
        <div style={{ fontSize: 10, color: 'var(--accent)', fontWeight: 700, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 12 }}>WHAT EACH GROOMSMAN GETS</div>
        {[
          { icon: 'SR', label: 'Style rules & dress code', desc: 'Colors, attire requirements — no guessing' },
          { icon: 'MP', label: 'Discover access', desc: 'Browse vendors, restaurants, and services in-app' },
          { icon: 'CL', label: `Personal checklist (${selectedReqs.length} items)`, desc: selectedReqs.map(k => GROOMSMEN_REQUIREMENTS.find(r => r.key === k)?.label).filter(Boolean).join(', ') },
          { icon: 'DB', label: 'Personal dashboard', desc: 'Their own view — tasks, status, what\'s needed' },
          { icon: 'TR', label: 'Activity tracking', desc: 'You see who\'s handled what — they see their progress' },
        ].map((item, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: i < 4 ? '1px solid var(--surface-dark-secondary)' : 'none' }}>
            <div style={{ width: 32, height: 32, borderRadius: 4, background: 'var(--surface-dark-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent)', fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{item.icon}</div>
            <div>
              <div style={{ color: 'var(--bone-on-dark)', fontWeight: 600, fontSize: 13 }}>{item.label}</div>
              <div style={{ color: 'var(--text-muted)', fontSize: 11 }}>{item.desc}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Email input */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>
        {isGroom ? 'DROP THEIR EMAILS' : 'ENTER EMAILS'}
      </div>
      <textarea className="input-field" placeholder={"best-man@email.com\ngroomsman1@email.com\ngroomsman2@email.com"} value={crewEmails}
                onChange={e => setCrewEmails(e.target.value)} rows={4} style={{ resize: 'none', marginBottom: 12 }} />

      {crewInviteSent ? (
        <div className="card fade-in" style={{ background: 'var(--success-bg)', border: '1px solid var(--success)', marginBottom: 16, textAlign: 'center', padding: 16 }}>
          <div style={{ color: 'var(--success)', fontWeight: 700, fontSize: 16 }}>✓ Invites sent</div>
          <div style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 4 }}>{crewEmails.split('\n').filter(e => e.trim()).length} groomsmen will get a link to join</div>
          <div style={{ color: 'var(--text-dim)', fontSize: 11, marginTop: 4 }}>(Prototype — no actual emails sent)</div>
        </div>
      ) : null}

      <button className="btn-primary" onClick={() => {
        const emailCount = crewEmails.split('\n').filter(e => e.trim()).length;
        if (emailCount > 0 && !crewInviteSent) {
          setCrewInviteSent(true);
        } else {
          finishOnboarding();
        }
      }} style={{ marginBottom: 10 }}>
        {crewInviteSent ? "Let's Go — Wedding is Set Up" : `Send ${crewEmails.split('\n').filter(e => e.trim()).length || ''} Invite${crewEmails.split('\n').filter(e => e.trim()).length !== 1 ? 's' : ''}`}
      </button>
      {!crewInviteSent && <button className="btn-secondary" onClick={finishOnboarding}>I'll add them later</button>}
      <div style={{ height: 40 }} />
    </div>
  );

  // ─── GENERAL FLOW: Steps 3-4 ───

  const generalStep3 = (
    <div key="g3" className="fade-in" style={{ padding: '40px 24px' }}>
      <div onClick={() => setStep(2)} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 16, fontWeight: 500 }}>← Back</div>
      <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: 'var(--text-primary)', marginBottom: 8, fontWeight: 700, letterSpacing: -0.5 }}>
        {eventType === 'birthday' ? "When's the birthday?" : "When's it happening?"}
      </h2>
      <p style={{ color: 'var(--text-muted)', marginBottom: 24, fontSize: 14 }}>We'll help you plan the details</p>
      <input className="input-field" type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} style={{ marginBottom: 16 }} />

      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 8, marginTop: 8 }}>LOCATION</div>
      {locationDetected ? (
        <div className="card fade-in" style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8, borderColor: 'var(--success)', padding: '10px 14px' }}>
          <div style={{ width: 28, height: 28, borderRadius: 4, background: 'var(--success-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--success)', fontSize: 12, fontWeight: 700 }}>✓</div>
          <div>
            <div style={{ color: 'var(--success)', fontSize: 11, fontWeight: 600 }}>DETECTED</div>
            <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 14 }}>{location}</div>
          </div>
        </div>
      ) : (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, color: 'var(--text-muted)' }}>
          <div style={{ width: 16, height: 16, borderRadius: '50%', border: '2px solid var(--text-dim)', borderTopColor: 'var(--text-secondary)', animation: 'spin 0.8s linear infinite' }} />
          <span style={{ fontSize: 13 }}>Detecting...</span>
        </div>
      )}
      <input className="input-field" placeholder="Or enter city manually" value={location} onChange={e => setLocation(e.target.value)} style={{ marginBottom: 24 }} />
      <button className="btn-primary" onClick={() => setStep(4)} style={{ marginBottom: 12 }}>Continue</button>
      <button className="btn-secondary" onClick={() => setStep(4)}>Not sure yet</button>
    </div>
  );

  const generalStep4 = (
    <div key="g4" className="fade-in" style={{ padding: '40px 24px' }}>
      <div onClick={() => setStep(3)} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 16, fontWeight: 500 }}>← Back</div>
      <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 26, color: 'var(--text-primary)', marginBottom: 8, fontWeight: 700, letterSpacing: -0.5 }}>Invite the first one</h2>
      <p style={{ color: 'var(--text-muted)', marginBottom: 24, fontSize: 14 }}>
        {isGroom ? "Get one of the boys in — the rest will follow" : "Share access with the group organizer"}
      </p>
      <input className="input-field" type="email" placeholder="Their email address" value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} style={{ marginBottom: 16 }} />
      <button className="btn-primary" onClick={() => {
        if (inviteEmail) alert(`Invite sent to ${inviteEmail}! (Prototype — no actual email sent)`);
        finishOnboarding();
      }} style={{ marginBottom: 12 }}>
        {inviteEmail ? 'Send Invite & Continue' : 'Continue'}
      </button>
      <button className="btn-secondary" onClick={finishOnboarding}>Skip for now</button>
    </div>
  );

  // Build steps array based on flow
  // Groomsman: role(0) → name(2) — skip event type, they were invited
  const steps = isGroomsmanRole
    ? [step0, step2]
    : isWedding
      ? [step0, step1, step2, weddingStep3, weddingStep4, weddingStep5, weddingStep6]
      : [step0, step1, step2, generalStep3, generalStep4];

  return (
    <div className="screen">
      <StatusBar />
      {/* Progress */}
      <div style={{ padding: '0 24px', display: 'flex', gap: 4, flexShrink: 0 }}>
        {steps.map((_, i) => (
          <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= step ? 'var(--surface-dark)' : 'var(--border)', transition: '0.3s' }} />
        ))}
      </div>
      <div className="screen-scroll" style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
        {steps[step]}
      </div>
    </div>
  );
}

// ── HOME SCREEN — UNIFIED DASHBOARD ──
function HomeScreen({ user, onNav, isGroom, activeEvent, crewInvited, weddingStyle, groomsmenReqs = [], onEditStyle, cardIssued = false, pastEvents = [], isBride = false, subEvents = [], notifications = [], onMarkNotifRead, events = [] }) {
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const unreadCount = notifications.filter(n => !n.read).length;
  const daysUntil = user.eventDate ? Math.max(0, Math.ceil((new Date(user.eventDate) - new Date()) / 86400000)) : null;
  const hasEvent = !!activeEvent;
  const isWedding = hasEvent ? activeEvent.eventType === 'wedding' : user.eventType === 'wedding';
  const dressLabel = weddingStyle?.dressCode === 'black-tie' ? 'Black Tie' : weddingStyle?.dressCode === 'formal' ? 'Formal' : weddingStyle?.dressCode === 'semi-formal' ? 'Semi-Formal' : weddingStyle?.dressCode === 'smart-casual' ? 'Smart Casual' : weddingStyle?.dressCode === 'casual' ? 'Casual' : null;

  // Build groomsmen mock data dynamically from selected requirements
  const buildTasks = (completionProfile) => {
    const tasks = {};
    groomsmenReqs.forEach((key, i) => { tasks[key] = completionProfile[i] || false; });
    return tasks;
  };
  const calcPct = (tasks) => {
    const keys = Object.keys(tasks);
    if (keys.length === 0) return 0;
    return Math.round((keys.filter(k => tasks[k]).length / keys.length) * 100);
  };
  const groomsmenRaw = [
    { name: "Jake Wilson", role: "Best Man", accepted: true, profile: [true, true, true, false, true, false, true, false] },
    { name: "Ryan Chen", role: "Groomsman", accepted: true, profile: [true, false, true, false, false, true, false, false] },
    { name: "Dan Murphy", role: "Groomsman", accepted: false, profile: [false, false, false, false, false, false, false, false] },
    { name: "Tom Rodriguez", role: "Groomsman", accepted: true, profile: [true, true, true, true, true, true, true, true] },
    { name: "Chris Lee", role: "Groomsman", accepted: false, profile: [false, false, false, false, false, false, false, false] },
  ];
  const groomsmen = groomsmenRaw.map(g => {
    const tasks = buildTasks(g.profile);
    return { ...g, tasks, pct: g.accepted ? calcPct(tasks) : -1 };
  });

  return (
    <div className="screen-scroll" style={{ padding: '0 20px 20px' }}>

      {/* ═══ HEADER — adapts to event type ═══ */}
      <div className="fade-in" style={{ paddingTop: 16, marginBottom: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
            <div onClick={() => onNav('profile')} style={{ width: 36, height: 36, borderRadius: '50%', background: 'var(--surface-dark)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent)', fontSize: 13, fontWeight: 800, cursor: 'pointer', flexShrink: 0 }}>
              {(user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase()}
            </div>
            <div style={{ flex: 1 }}>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--text-primary)', fontWeight: 700, letterSpacing: -0.5 }}>
                {isWedding
                  ? (isBride
                      ? `Hey ${user.name || 'Sarah'}.`
                      : (user.name && user.partnerName ? `${user.name} & ${user.partnerName}` : `${user.name || 'Mike'}'s Wedding`))
                  : (isGroom ? `What's good, ${user.name || 'Mike'}.` : `Hey, ${user.name || 'Sarah'}.`)}
              </h1>
              <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>
                {isWedding
                  ? (isBride
                      ? `Here's what ${user.partnerName || 'he'} has going on`
                      : `${user.location || 'Location TBD'}${user.weddingVenue ? ` · ${user.weddingVenue}` : ''}`)
                  : (hasEvent ? (daysUntil !== null ? `${daysUntil} days out` : "You're locked in") : "Let's get it set up")}
              </p>
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
            <div onClick={() => setShowNotifPanel(!showNotifPanel)} style={{ width: 36, height: 36, borderRadius: '50%', background: 'var(--bg-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', position: 'relative', fontSize: 16 }}>
              🔔
              {unreadCount > 0 && <div style={{ position: 'absolute', top: -2, right: -2, width: 16, height: 16, borderRadius: '50%', background: 'var(--danger)', color: 'var(--accent-text)', fontSize: 9, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{unreadCount}</div>}
            </div>
            {daysUntil !== null && (
              <div style={{ background: 'var(--surface-dark)', borderRadius: 2, padding: '8px 12px', textAlign: 'center' }}>
                <div style={{ color: 'var(--accent)', fontSize: 20, fontWeight: 800, lineHeight: 1 }}>{daysUntil}</div>
                <div style={{ color: 'var(--text-muted)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>DAYS</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ═══ NOTIFICATION PANEL ═══ */}
      {showNotifPanel && (
        <div className="fade-in" style={{ marginBottom: 16 }}>
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>Notifications</span>
              <span onClick={() => { if (onMarkNotifRead) onMarkNotifRead('all'); }} style={{ fontSize: 11, color: 'var(--accent-text)', fontWeight: 600, cursor: 'pointer', background: 'var(--accent-bg)', padding: '3px 8px', borderRadius: 2 }}>Mark all read</span>
            </div>
            {notifications.length === 0 ? (
              <div style={{ padding: '20px', textAlign: 'center', color: 'var(--text-dim)', fontSize: 13 }}>No notifications</div>
            ) : notifications.slice(0, 6).map(n => {
              const typeColors = { success: 'var(--success)', info: 'var(--info)', accent: 'var(--accent-text)', warning: 'var(--warning)' };
              return (
                <div key={n.id} onClick={() => { if (onMarkNotifRead) onMarkNotifRead(n.id); }}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderBottom: '1px solid var(--border)', opacity: n.read ? 0.5 : 1, cursor: 'pointer' }}>
                  <div style={{ width: 32, height: 32, borderRadius: '50%', background: `${typeColors[n.type] || 'var(--bg-secondary)'}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: typeColors[n.type] || 'var(--text-muted)', fontSize: 14, flexShrink: 0 }}>
                    {n.type === 'success' ? '✓' : n.type === 'accent' ? '★' : 'ℹ'}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600 }}>{n.title}</div>
                    <div style={{ color: 'var(--text-dim)', fontSize: 11 }}>{n.desc}</div>
                  </div>
                  <div style={{ color: 'var(--text-dim)', fontSize: 10, flexShrink: 0 }}>{n.time}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ═══ WEDDING-ONLY: Details Summary ═══ */}
      {isWedding && (
        <div className="card slide-up" style={{ marginBottom: 12, padding: 0, overflow: 'hidden' }}>
          <div style={{ display: 'flex' }}>
            <div style={{ flex: 1, padding: '12px 14px', borderRight: '1px solid var(--border)' }}>
              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>DATE</div>
              <div style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600, marginTop: 2 }}>{user.eventDate ? new Date(user.eventDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'TBD'}</div>
            </div>
            <div style={{ flex: 1, padding: '12px 14px', borderRight: '1px solid var(--border)' }}>
              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>DRESS CODE</div>
              <div style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600, marginTop: 2 }}>{dressLabel || 'Not set'}</div>
            </div>
            <div style={{ flex: 1, padding: '12px 14px' }}>
              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>CREW</div>
              <div style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600, marginTop: 2 }}>{crewInvited ? '5 invited' : '0'}</div>
            </div>
          </div>
          {weddingStyle?.colors?.length > 0 && (
            <div onClick={onEditStyle} style={{ display: 'flex', borderTop: '1px solid var(--border)', cursor: 'pointer' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '10px 14px', flex: 1 }}>
                {weddingStyle.colors.map((hex, i) => <div key={i} style={{ width: 20, height: 20, borderRadius: 4, background: hex, border: hex === '#FFFFF0' ? '1px solid var(--border)' : 'none' }} />)}
                {weddingStyle.attireNotes && <span style={{ color: 'var(--text-dim)', fontSize: 11, marginLeft: 4, fontStyle: 'italic' }}>"{weddingStyle.attireNotes.substring(0, 30)}{weddingStyle.attireNotes.length > 30 ? '...' : ''}"</span>}
              </div>
              <div style={{ padding: '10px 14px', color: 'var(--text-dim)', fontSize: 12 }}>Edit →</div>
            </div>
          )}
          {!weddingStyle?.colors?.length && (
            <div onClick={onEditStyle} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderTop: '1px solid var(--border)', padding: '10px 14px', cursor: 'pointer' }}>
              <span style={{ color: 'var(--text-muted)', fontSize: 12 }}>Set wedding colors & style rules</span>
              <span style={{ color: 'var(--text-dim)', fontSize: 12 }}>→</span>
            </div>
          )}
        </div>
      )}

      {/* ═══ WEDDING-ONLY: Upcoming Timeline Preview ═══ */}
      {isWedding && subEvents.length > 0 && (() => {
        const upcoming = [...subEvents].sort((a, b) => {
          const da = new Date(a.date + 'T' + (a.time || '00:00'));
          const db = new Date(b.date + 'T' + (b.time || '00:00'));
          return da - db;
        }).slice(0, 3);
        const fmtTime = (t) => {
          if (!t) return '';
          const [h, m] = t.split(':');
          const hour = parseInt(h);
          return (hour === 0 ? 12 : hour > 12 ? hour - 12 : hour) + ':' + m + ' ' + (hour >= 12 ? 'PM' : 'AM');
        };
        return (
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 1.5 }}>UPCOMING</div>
              <div onClick={() => onNav('timeline')} style={{ color: 'var(--accent)', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>See all →</div>
            </div>
            <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
              {upcoming.map((evt, i) => (
                <div key={evt.id} onClick={() => onNav('timeline')} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderBottom: i < upcoming.length - 1 ? '1px solid var(--border)' : 'none', cursor: 'pointer' }}>
                  <div style={{ background: 'var(--accent-bg)', borderRadius: 2, padding: '4px 8px', textAlign: 'center', flexShrink: 0, minWidth: 46 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-muted)', lineHeight: 1.2 }}>{evt.date ? new Date(evt.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short' }).toUpperCase() : '---'}</div>
                    <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--text-primary)', lineHeight: 1.2 }}>{evt.date ? new Date(evt.date + 'T12:00:00').getDate() : '--'}</div>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 13, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{evt.name}</div>
                    {evt.time && <div style={{ color: 'var(--text-muted)', fontSize: 11 }}>{fmtTime(evt.time)}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ═══ WEDDING-ONLY: Requirements Summary ═══ */}
      {isWedding && groomsmenReqs.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 1.5 }}>REQUIREMENTS</div>
            <div onClick={() => onNav('plan')} style={{ color: 'var(--accent)', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Shop →</div>
          </div>
          <div className="card" style={{ padding: '10px 14px' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {groomsmenReqs.map(key => {
                const labels = { tux: '🤵 Tux / Suit', shoes: '👞 Shoes', grooming: '💈 Grooming', rsvp: '✉️ RSVP', gift: '🎁 Gift', travel: '✈️ Travel', fitting: '📐 Fitting', accessories: '👔 Accessories' };
                return (
                  <span key={key} style={{ fontSize: 10, fontWeight: 600, padding: '4px 10px', borderRadius: 2, background: 'var(--bg-secondary)', color: 'var(--text-secondary)' }}>
                    {labels[key] || key}
                  </span>

            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>

              <span style={{ color: 'var(--text-dim)', fontSize: 20 }}>›</span>
            </div>
          </div>

      </div>

      {activeEvent ? (
        <>

              <div style={{ background: 'var(--accent)', color: 'var(--surface-dark)', fontSize: 10, fontWeight: 600, padding: '3px 8px', borderRadius: 2 }}>In Planning</div>
            </div>
            <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>{activeEvent.duration} · {activeEvent.location || user.location} · {activeEvent.budget}</div>
          </div>
        </>
      ) : (
        <div className="card" style={{ marginBottom: 16, textAlign: 'center', padding: '24px 20px', borderStyle: 'dashed' }}>
          <div style={{ color: 'var(--text-muted)', fontSize: 14 }}>{isGroom ? "No events yet — pick a template above to get started" : "No events yet — create one to get started"}</div>
        </div>
      )}
    </div>
  );
}

          </>
        )}
      </div>
    );
  }

  return (
    <div className="screen-scroll" style={{ padding: '0 20px 20px', position: 'relative' }}>
      {/* Category tabs */}
      <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 12, marginBottom: 8 }}>
        {reqCats.map(c => (
          <div key={c} onClick={() => setActiveCat(c)}

                     background: activeCat === c ? 'var(--surface-dark)' : 'var(--bg-card)',
                     color: activeCat === c ? '#fff' : 'var(--text-secondary)',
                     border: `1px solid ${activeCat === c ? 'var(--surface-dark)' : 'var(--border)'}` }}>

      </div>

      {/* Items */}
      {displayItems.map(item => {

        return (
          <div key={item.id} className="card" style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>

                            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, fontWeight: 700, color: 'var(--accent)', letterSpacing: -0.5, flexShrink: 0, cursor: 'pointer' }}>{item.initial}</div>
              <div style={{ flex: 1, cursor: 'pointer' }} onClick={() => { setDetailItem(item); window.gTrack('marketplace_item_opened', { id: item.id, name: item.name, cat: item.cat }); }}>

                  <div style={{ color: 'var(--accent)', fontSize: 12, fontWeight: 600 }}>{item.price}</div>

                <div style={{ display: 'flex', gap: 8, marginTop: 4, alignItems: 'center' }}>
                  <span style={{ color: 'var(--text-secondary)', fontSize: 11, fontWeight: 600 }}>★ {item.rating}</span>
                  <span style={{ color: 'var(--text-dim)', fontSize: 11 }}>({item.reviews.toLocaleString()})</span>
                  {item.affiliate && <span style={{ background: 'var(--bg-secondary)', color: 'var(--text-muted)', fontSize: 9, padding: '2px 6px', borderRadius: 2, fontWeight: 600 }}>{item.affiliate}</span>}
                </div>

              <div onClick={(e) => { e.stopPropagation(); addToCart(item); }} style={{ width: 32, height: 32, borderRadius: 2, background: inCart ? 'var(--success)' : 'var(--bg-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, transition: '0.2s' }}>
                <span style={{ color: inCart ? '#fff' : 'var(--text-secondary)', fontSize: 14, fontWeight: 700 }}>{inCart ? '✓' : '+'}</span>

          <span style={{ color: 'var(--accent)', fontSize: 13, fontWeight: 700 }}>View Cart →</span>

      {/* ── In-app vendor detail sheet ── */}
      {detailItem && (
        <div onClick={() => setDetailItem(null)} style={{
          position: 'absolute', inset: 0, zIndex: 50,
          background: 'rgba(8,9,11,0.55)',

// ── AI CHAT ──
function ChatScreen({ user }) {
  const [chatTab, setChatTab] = useState('ai');
  // AI chat state
  const [aiMessages, setAiMessages] = useState([{ role: 'ai', text: AI_RESPONSES.greeting }]);
  const [aiInput, setAiInput] = useState('');
  const [typing, setTyping] = useState(false);
  const aiScrollRef = useRef(null);

  // Crew chat state
  const CREW_SEED = [
    { sender: 'Jake W.', role: 'Best Man', text: 'Nashville is gonna be insane', time: '2:14 PM', color: '#2563EB' },
    { sender: 'Ryan C.', role: 'Groomsman', text: 'I\'m in. Do we need to book flights separately?', time: '2:16 PM', color: '#7C3AED' },
    { sender: 'Tom R.', role: 'Groomsman', text: 'Already looking at Airbnbs near Broadway', time: '2:20 PM', color: '#059669' },
    { sender: 'You', role: '', text: 'Let\'s lock Nashville in. I\'ll send the poll.', time: '2:22 PM', color: '' },
    { sender: 'Jake W.', role: 'Best Man', text: 'Did everyone handle their tux yet? Tom you\'re the only one at 100%', time: '2:35 PM', color: '#2563EB' },
    { sender: 'Chris L.', role: 'Groomsman', text: 'Booking mine this weekend', time: '2:38 PM', color: 'var(--danger)' },
  ];
  const [crewMessages, setCrewMessages] = useState(CREW_SEED);
  const [crewInput, setCrewInput] = useState('');
  const crewScrollRef = useRef(null);

  const suggestions = ["Plan the bachelor party", "Find spots in Nashville", "Gift ideas for the boys", "What's the budget looking like?"];

  useEffect(() => {
    if (chatTab === 'ai') aiScrollRef.current?.scrollTo({ top: aiScrollRef.current.scrollHeight, behavior: 'smooth' });
    else crewScrollRef.current?.scrollTo({ top: crewScrollRef.current.scrollHeight, behavior: 'smooth' });
  }, [aiMessages, crewMessages, typing, chatTab]);

  const sendAi = (text) => {
    if (!text.trim()) return;
    setAiMessages(prev => [...prev, { role: 'user', text: text.trim() }]);
    setAiInput('');
    setTyping(true);
    setTimeout(() => {
      setAiMessages(prev => [...prev, { role: 'ai', text: matchAI(text) }]);
      setTyping(false);
    }, 800 + Math.random() * 1200);
  };

  const sendCrew = () => {
    if (!crewInput.trim()) return;
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    setCrewMessages(prev => [...prev, { sender: 'You', role: '', text: crewInput.trim(), time, color: '' }]);
    setCrewInput('');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden', minHeight: 0 }}>
      {/* Header + Tabs */}
      <div style={{ padding: '12px 20px 0', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: 2, background: 'var(--surface-dark)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 6 }}>
            <Logo size={18} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 15 }}>{chatTab === 'ai' ? 'Concierge' : 'Crew Chat'}</div>
            <div style={{ color: 'var(--success)', fontSize: 11, fontWeight: 500 }}>{chatTab === 'ai' ? '● Online' : '5 members'}</div>
          </div>
        </div>
        <div style={{ display: 'flex', background: 'var(--bg-secondary)', borderRadius: 2, padding: 3 }}>
          {[{ key: 'ai', label: 'AI' }, { key: 'crew', label: 'Crew' }].map(t => (
            <div key={t.key} onClick={() => setChatTab(t.key)} style={{
              flex: 1, textAlign: 'center', padding: '8px 0', borderRadius: 2, fontSize: 13, fontWeight: 600, cursor: 'pointer',
              background: chatTab === t.key ? 'var(--surface-dark)' : 'transparent',
              color: chatTab === t.key ? '#FAFAF9' : 'var(--text-muted)', transition: '0.2s'
            }}>{t.label}</div>
          ))}
        </div>
      </div>

      {/* AI TAB */}
      {chatTab === 'ai' && (
        <>
          <div ref={aiScrollRef} style={{ flex: 1, overflow: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 12, minHeight: 0 }}>
            {aiMessages.map((m, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
                <div className={m.role === 'user' ? 'chat-user' : 'chat-ai'}>
                  {m.role === 'ai' && <div style={{ marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 }}><Logo size={10} /><span style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>GROOMS</span></div>}
                  <div style={{ whiteSpace: 'pre-line' }}>{m.text}</div>
                </div>
              </div>
            ))}
            {typing && (
              <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                <div className="chat-ai" style={{ animation: 'pulse 1s infinite' }}>
                  <div style={{ marginBottom: 4, display: 'flex', alignItems: 'center', gap: 4 }}><Logo size={10} /><span style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 700, letterSpacing: 0.5 }}>GROOMS</span></div>
                  <span style={{ color: 'var(--text-muted)' }}>Thinking...</span>
                </div>
              </div>
            )}
            {aiMessages.length <= 1 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
                {suggestions.map((s, i) => (
                  <div key={i} onClick={() => sendAi(s)}
                    style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 2,
                             padding: '6px 14px', fontSize: 12, color: 'var(--text-secondary)', cursor: 'pointer' }}>{s}</div>
                ))}
              </div>
            )}
          </div>
          <div style={{ padding: '12px 20px 8px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input className="input-field" placeholder="Ask anything..." value={aiInput}
                     onChange={e => setAiInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendAi(aiInput)}
                     style={{ flex: 1, borderRadius: 2, padding: '12px 20px' }} />
              <div onClick={() => sendAi(aiInput)}
                style={{ width: 42, height: 42, borderRadius: '50%', background: 'var(--surface-dark)', display: 'flex', alignItems: 'center',
                         justifyContent: 'center', cursor: 'pointer', fontSize: 16, flexShrink: 0, color: 'var(--accent)', fontWeight: 700 }}>→</div>
            </div>
          </div>
        </>
      )}

      {/* CREW TAB */}
      {chatTab === 'crew' && (
        <>
          <div ref={crewScrollRef} style={{ flex: 1, overflow: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 10, minHeight: 0 }}>
            {crewMessages.map((m, i) => {
              const isYou = m.sender === 'You';
              return (
                <div key={i} style={{ display: 'flex', justifyContent: isYou ? 'flex-end' : 'flex-start', gap: 8 }}>
                  {!isYou && (
                    <div style={{ width: 30, height: 30, borderRadius: '50%', background: m.color || 'var(--bg-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center',
                                  color: 'var(--accent-text)', fontSize: 10, fontWeight: 700, flexShrink: 0, marginTop: 2 }}>
                      {m.sender.split(' ').map(w => w[0]).join('')}
                    </div>
                  )}
                  <div style={{ maxWidth: '75%' }}>
                    {!isYou && (
                      <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 2 }}>
                        {m.sender} {m.role && <span style={{ fontWeight: 400, color: 'var(--text-dim)' }}>· {m.role}</span>}
                      </div>
                    )}
                    <div className={isYou ? 'chat-user' : 'chat-ai'}>
                      <div>{m.text}</div>
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--text-dim)', marginTop: 2, textAlign: isYou ? 'right' : 'left' }}>{m.time}</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ padding: '12px 20px 8px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input className="input-field" placeholder="Message the crew..." value={crewInput}
                     onChange={e => setCrewInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendCrew()}
                     style={{ flex: 1, borderRadius: 2, padding: '12px 20px' }} />
              <div onClick={sendCrew}
                style={{ width: 42, height: 42, borderRadius: '50%', background: 'var(--surface-dark)', display: 'flex', alignItems: 'center',
                         justifyContent: 'center', cursor: 'pointer', fontSize: 16, flexShrink: 0, color: 'var(--accent)', fontWeight: 700 }}>→</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

          ) : (

            </button>
          )}
        </div>
      )}

      {/* Crew list */}
      {isEventInvite && <div style={{ fontSize: 10, color: 'var(--text-dim)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>GROOMSMEN — AUTO-INCLUDED</div>}
      {crew.map((m, i) => (
        <div key={i} className="card" style={{ marginBottom: 8, display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'var(--bg-secondary)', border: `2px solid ${statusColor[m.status]}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-primary)', fontWeight: 700, fontSize: 16 }}>
            {m.name.split(' ').map(n => n[0]).join('')}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 14 }}>{m.name}</div>
            <div style={{ color: 'var(--text-muted)', fontSize: 12 }}>{isEventInvite && m.groomsman ? 'Groomsman · Auto-included' : m.role}</div>
          </div>
          <div style={{ color: statusColor[m.status], fontSize: 11, fontWeight: 600, textTransform: 'capitalize' }}>{m.status}</div>
        </div>
      ))}

      {/* Done — back to dashboard */}
      <button className="btn-secondary" onClick={() => onNav('home')} style={{ marginTop: 12, marginBottom: 16 }}>
        ← Back to Dashboard
      </button>
    </div>
  );
}

    { name: 'Black', hex: '#1C1917' },
    { name: 'Ivory', hex: '#FFFFF0' },
    { name: 'Sage', hex: '#8A9A5B' },
    { name: 'Lavender', hex: '#967BB6' },
    { name: 'Terracotta', hex: '#C2693D' },

  const [selectedColors, setSelectedColors] = useState(existingStyle?.colors || []);

  const toggleColor = (hex) => {
    setSelectedColors(prev =>
      prev.includes(hex) ? prev.filter(c => c !== hex) : prev.length < 4 ? [...prev, hex] : prev

  };

  return (
    <div className="screen-scroll" style={{ padding: '0 20px 20px' }}>
      <div style={{ paddingTop: 16, marginBottom: 20 }}>
        <div onClick={onSkip} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 12, fontWeight: 500 }}>← Back</div>

        <p style={{ color: 'var(--text-muted)', fontSize: 14 }}>
          {isGroom ? "Colors, dress code, the look — lock it in so the boys know what's up." : "Define wedding colors and attire so the crew shows up right."}

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginBottom: 8 }}>
        {COLOR_SWATCHES.map(c => {
          const isSelected = selectedColors.includes(c.hex);
          return (
            <div key={c.hex} onClick={() => toggleColor(c.hex)} style={{ cursor: 'pointer', textAlign: 'center', width: 62 }}>
              <div style={{
                width: 48, height: 48, borderRadius: 4, background: c.hex, margin: '0 auto 4px',
                border: isSelected ? '3px solid var(--surface-dark)' : c.hex === '#FFFFF0' ? '1px solid var(--border)' : '1px solid transparent',
                boxShadow: isSelected ? '0 0 0 2px var(--accent)' : 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: '0.2s'
              }}>
                {isSelected && <span style={{ color: c.hex === '#1C1917' || c.hex === '#1E3A5F' || c.hex === '#3D3D3D' || c.hex === '#722F37' || c.hex === '#2D5A27' ? '#fff' : '#1C1917', fontSize: 16, fontWeight: 700 }}>✓</span>}
              </div>
              <div style={{ color: isSelected ? 'var(--text-primary)' : 'var(--text-muted)', fontSize: 10, fontWeight: isSelected ? 600 : 400 }}>{c.name}</div>
            </div>

      </div>

      {/* Selected colors preview */}
      {selectedColors.length > 0 && (
        <div className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20, padding: '10px 14px', background: 'var(--bg-secondary)', borderRadius: 2 }}>

            {selectedColors.map((hex, i) => (
              <div key={i} style={{ width: 24, height: 24, borderRadius: 4, background: hex, border: hex === '#FFFFF0' ? '1px solid var(--border)' : 'none' }} />
            ))}
          </div>
        </div>
      )}

      {/* Dress Code */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 12, marginTop: 8 }}>DRESS CODE</div>

          <div key={d.val} className="card" onClick={() => setDressCode(d.val)}

            <div style={{ width: 36, height: 36, borderRadius: 2,
                          background: dressCode === d.val ? 'var(--surface-dark)' : 'var(--bg-secondary)',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          color: dressCode === d.val ? 'var(--accent)' : 'var(--text-muted)',
                          fontSize: 11, fontWeight: 700 }}>
              {d.val === 'black-tie' ? 'BT' : d.val === 'formal' ? 'FM' : d.val === 'semi-formal' ? 'SF' : d.val === 'smart-casual' ? 'SC' : 'CS'}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 14 }}>{d.label}</div>
              <div style={{ color: 'var(--text-muted)', fontSize: 12 }}>{d.desc}</div>
            </div>
            {dressCode === d.val && <span style={{ color: 'var(--surface-dark)', fontSize: 16, fontWeight: 700 }}>✓</span>}
          </div>
        ))}
      </div>

      {/* Specific Attire Notes */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 8 }}>ATTIRE NOTES FOR THE CREW</div>
      <p style={{ color: 'var(--text-dim)', fontSize: 12, marginBottom: 12 }}>{isGroom ? "Anything specific the boys need to know — colors to match, what to avoid, etc." : "Specific instructions for the groomsmen"}</p>
      <textarea className="input-field" placeholder={isGroom ? "e.g. Navy suits, no black. Champagne ties. Brown shoes only." : "e.g. Navy suits with champagne ties. No black shoes."} value={attireNotes}
                onChange={e => setAttireNotes(e.target.value)} rows={3} style={{ resize: 'none', marginBottom: 24 }} />

      <button className="btn-primary" onClick={() => onSave({ colors: selectedColors, dressCode, attireNotes })} style={{ marginBottom: 10 }}>
        {existingStyle ? 'Update Style Rules' : 'Save Style Rules'}
      </button>
      <button className="btn-secondary" onClick={onSkip}>
        {existingStyle ? 'Cancel' : 'Skip for now'}
      </button>
    </div>
  );
}

          </>
        )}
      </div>
    </div>
  );
}

              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>COLLECTED</div>
              <div style={{ color: 'var(--success)', fontSize: 20, fontWeight: 700 }}>${totalCollected.toLocaleString()}</div>
            </div>
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>PER PERSON</div>
              <div style={{ color: 'var(--text-secondary)', fontSize: 20, fontWeight: 700 }}>${Math.round(totalBudget / invitees.length).toLocaleString()}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ color: 'var(--text-dim)', fontSize: 9, fontWeight: 600, letterSpacing: 0.5 }}>TARGET</div>
              <div style={{ color: 'var(--text-primary)', fontSize: 20, fontWeight: 700 }}>${totalBudget.toLocaleString()}</div>
            </div>
          </div>
          {/* Progress bar */}
          <div style={{ height: 6, background: 'var(--bg-secondary)', borderRadius: 2, overflow: 'hidden', marginBottom: 6 }}>
            <div style={{ height: '100%', width: pctFunded + '%', background: 'var(--accent)', borderRadius: 2, transition: 'width 0.4s ease' }} />
          </div>
          <div style={{ color: 'var(--text-dim)', fontSize: 11, textAlign: 'right', marginBottom: 12 }}>{pctFunded}% funded · {invitees.filter(i => i.contributed).length} of {invitees.length} paid</div>
          {/* Quick actions row */}
          <div style={{ display: 'flex', gap: 8 }}>
            <div onClick={() => onNav('card')} style={{ flex: 1, background: 'var(--surface-dark)', padding: '10px', borderRadius: 'var(--radius)', cursor: 'pointer', textAlign: 'center' }}>
              <span style={{ color: 'var(--accent)', fontSize: 12, fontWeight: 600 }}>💳 Transactions</span>
            </div>
            <div style={{ flex: 1, background: 'var(--bg-secondary)', padding: '10px', borderRadius: 'var(--radius)', cursor: 'pointer', textAlign: 'center' }}>
              <span style={{ color: 'var(--text-secondary)', fontSize: 12, fontWeight: 600 }}>📊 Spending</span>
            </div>
          </div>
        </div>
      ) : (
        <div className="card" style={{ marginBottom: 16, padding: '16px', borderStyle: 'dashed' }}>
          <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Set up cost splitting</div>
          <div style={{ color: 'var(--text-dim)', fontSize: 12, marginBottom: 10 }}>Activate the Ventura Onyx to collect contributions from the crew and track spending for this event.</div>
          <div onClick={() => { event.splitCosts = true; onNav('eventDetail'); }} style={{ background: 'var(--accent)', color: 'var(--surface-dark)', fontWeight: 700, fontSize: 12, padding: '10px', borderRadius: 'var(--radius)', cursor: 'pointer', textAlign: 'center' }}>
            Activate Ventura Onyx
          </div>
        </div>
      )}

      {/* Invitees */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>
        {isWedding ? 'THE BOYS' : 'CREW'} · {invitees.length}
      </div>
      <div className="card" style={{ padding: '6px 14px', marginBottom: 16 }}>
        {invitees.map((inv, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 0', borderBottom: i < invitees.length - 1 ? '1px solid var(--border)' : 'none' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: inv.status === 'accepted' ? 'var(--accent-bg)' : 'var(--bg-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: inv.status === 'accepted' ? 'var(--accent-text)' : 'var(--text-dim)' }}>
                {inv.name.split(' ').map(n => n[0]).join('')}
              </div>
              <div>
                <div style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600 }}>{inv.name}</div>
                <div style={{ color: 'var(--text-dim)', fontSize: 10 }}>
                  {inv.status === 'accepted' ? 'Accepted' : inv.status === 'pending' ? 'Pending RSVP' : 'Invited'}
                </div>
              </div>
            </div>
            {event.splitCosts && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                {inv.contributed ? (
                  <>
                    <span style={{ color: 'var(--text-primary)', fontSize: 13, fontWeight: 600 }}>${inv.amount}</span>
                    <span style={{ fontSize: 9, fontWeight: 600, padding: '2px 6px', borderRadius: 2, background: 'var(--success-bg)', color: 'var(--success)' }}>PAID</span>
                  </>
                ) : (
                  <span style={{ fontSize: 9, fontWeight: 600, padding: '2px 6px', borderRadius: 2, background: 'var(--bg-secondary)', color: 'var(--text-dim)' }}>UNPAID</span>
                )}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Invite more */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>INVITE MORE</div>
      <div className="card" style={{ padding: '14px', marginBottom: 16 }}>
        {inviteSent ? (
          <div style={{ textAlign: 'center', padding: '8px 0' }}>
            <div style={{ color: 'var(--success)', fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Invite sent!</div>
            <div onClick={() => setInviteSent(false)} style={{ color: 'var(--accent)', fontSize: 12, cursor: 'pointer' }}>Send another</div>
          </div>
        ) : (
          <div style={{ display: 'flex', gap: 8 }}>
            <input value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} placeholder="Email or phone" style={{ flex: 1, background: 'var(--bg-secondary)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '10px 12px', color: 'var(--text-primary)', fontSize: 13, outline: 'none' }} />
            <div onClick={() => { if (inviteEmail.trim()) { setInviteSent(true); setInviteEmail(''); } }} style={{ background: 'var(--accent)', color: 'var(--surface-dark)', fontWeight: 700, fontSize: 12, padding: '10px 16px', borderRadius: 'var(--radius)', cursor: 'pointer', display: 'flex', alignItems: 'center', whiteSpace: 'nowrap' }}>Send</div>
          </div>
        )}
      </div>

      {/* Request money — if splitCosts but not yet fully funded */}
      {event.splitCosts && (
        <>
          <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>COLLECT FUNDS</div>
          <div className="card" style={{ marginBottom: 16, padding: '16px' }}>
            <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 14, marginBottom: 6 }}>Request contributions</div>
            <div style={{ color: 'var(--text-dim)', fontSize: 12, marginBottom: 12 }}>
              {requestsSent
                ? 'Payment requests sent! Waiting for the crew to contribute.'
                : `Send payment requests to crew members who haven't paid yet. Each person owes $${Math.round(totalBudget / invitees.length).toLocaleString()}.`}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              {requestsSent ? (
                <div style={{ flex: 1, background: 'var(--success-bg)', border: '1px solid var(--success)', color: 'var(--success)', fontWeight: 700, fontSize: 12, padding: '12px', borderRadius: 'var(--radius)', textAlign: 'center' }}>
                  ✓ Requests Sent — {invitees.filter(i => !i.contributed).length} pending
                </div>
              ) : (
                <div onClick={() => setRequestsSent(true)} style={{ flex: 1, background: 'var(--accent)', color: 'var(--surface-dark)', fontWeight: 700, fontSize: 12, padding: '12px', borderRadius: 'var(--radius)', cursor: 'pointer', textAlign: 'center' }}>
                  Send Requests ({invitees.filter(i => !i.contributed).length} pending)
                </div>
              )}
              {cardIssued && (
                <div onClick={() => onNav('card')} style={{ padding: '12px 16px', borderRadius: 'var(--radius)', background: 'var(--bg-secondary)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontSize: 13 }}>💳</span>
                  <span style={{ color: 'var(--text-secondary)', fontSize: 12, fontWeight: 600 }}>Card</span>
                </div>
              )}
            </div>
          </div>
        </>
      )}

      {/* Quick actions */}
      <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.18em', fontFamily: 'var(--font-mono)', marginBottom: 10 }}>ACTIONS</div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        {[
          { icon: '📋', label: 'Checklist' },
          { icon: '📍', label: 'Venues' },
          { icon: '💬', label: 'Group Chat' },
          { icon: '🛍', label: 'Discover', action: () => onNav('plan') },
        ].map((a, i) => (
          <div key={i} className="card" onClick={a.action || (() => {})} style={{ flex: 1, padding: '14px 8px', textAlign: 'center', cursor: 'pointer' }}>
            <div style={{ fontSize: 20, marginBottom: 4 }}>{a.icon}</div>
            <div style={{ color: 'var(--text-secondary)', fontSize: 10, fontWeight: 600 }}>{a.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// TIMELINE SCREEN — Shared chronological sub-events
// ═══════════════════════════════════════════
function TimelineScreen({ subEvents = [], onAddEvent, user, weddingDate, onNav }) {
  const [showForm, setShowForm] = useState(false);
  const [formName, setFormName] = useState('');
  const [formDate, setFormDate] = useState(weddingDate || '');
  const [formTime, setFormTime] = useState('');
  const [formLocation, setFormLocation] = useState('');
  const [formDesc, setFormDesc] = useState('');

  const sorted = [...subEvents].sort((a, b) => {
    const da = new Date(a.date + 'T' + (a.time || '00:00'));
    const db = new Date(b.date + 'T' + (b.time || '00:00'));
    return da - db;
  });

  const borderColors = ['var(--accent)', '#2563EB', 'var(--warning)', 'var(--danger)', 'var(--success)', '#A855F7', '#EC4899', '#F97316'];

  const handleCreate = () => {
    if (!formName.trim()) return;
    onAddEvent({
      id: 'evt-' + Date.now(),
      name: formName.trim(),
      date: formDate,
      time: formTime,
      location: formLocation.trim(),
      description: formDesc.trim(),
      createdBy: user.name || (user.role === 'bride' ? 'Bride' : 'Groom')
    });
    setFormName('');
    setFormDate(weddingDate || '');
    setFormTime('');
    setFormLocation('');
    setFormDesc('');
    setShowForm(false);
  };

  const formatDate = (d) => {
    if (!d) return 'TBD';
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  };
  const formatTime = (t) => {
    if (!t) return '';
    const [h, m] = t.split(':');
    const hour = parseInt(h);
    const ampm = hour >= 12 ? 'PM' : 'AM';
    const h12 = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
    return h12 + ':' + m + ' ' + ampm;
  };

  return (
    <div className="screen-scroll" style={{ padding: '0 20px 100px' }}>
      <div style={{ paddingTop: 16, marginBottom: 20 }}>
        <div onClick={() => onNav('home')} style={{ color: 'var(--text-muted)', fontSize: 14, cursor: 'pointer', marginBottom: 12, fontWeight: 500 }}>← Back</div>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--text-primary)', fontWeight: 700, letterSpacing: -0.3, marginBottom: 4 }}>Timeline</h2>
        {weddingDate && (
          <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>Wedding Day: {new Date(weddingDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</p>
        )}
      </div>

      {sorted.length === 0 && !showForm && (
        <div className="card" style={{ textAlign: 'center', padding: '30px 20px' }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>📅</div>
          <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 15, marginBottom: 4 }}>No events yet</div>
          <div style={{ color: 'var(--text-muted)', fontSize: 13 }}>Add sub-events to build your wedding weekend timeline</div>
        </div>
      )}

      {sorted.map((evt, i) => (
        <div key={evt.id} className="card slide-up" style={{ marginBottom: 10, padding: 0, overflow: 'hidden', display: 'flex', animationDelay: (i * 0.04) + 's' }}>
          <div style={{ width: 4, background: borderColors[i % borderColors.length], flexShrink: 0 }} />
          <div style={{ padding: '14px 16px', flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start' }}>
              <div style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: 15 }}>{evt.name}</div>
              <div style={{ background: 'var(--bg-secondary)', borderRadius: 2, padding: '3px 8px', fontSize: 10, fontWeight: 600, color: 'var(--text-muted)', whiteSpace: 'nowrap', flexShrink: 0 }}>{evt.createdBy}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>
              <span style={{ background: 'var(--accent-bg)', color: 'var(--text-primary)', fontSize: 11, fontWeight: 600, padding: '3px 8px', borderRadius: 2 }}>{formatDate(evt.date)}</span>
              {evt.time && <span style={{ color: 'var(--text-secondary)', fontSize: 12, fontWeight: 500 }}>{formatTime(evt.time)}</span>}
            </div>
            {evt.location && <div style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 4 }}>📍 {evt.location}</div>}
            {evt.description && <div style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 4 }}>{evt.description}</div>}
          </div>
        </div>
      ))}

      {showForm && (
        <div className="card slide-up" style={{ marginTop: 16, padding: '16px' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 14 }}>Add Event</div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: 'block', fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, marginBottom: 4 }}>EVENT NAME *</label>
            <input value={formName} onChange={e => setFormName(e.target.value)} placeholder="e.g. Rehearsal Dinner" style={{ width: '100%', padding: '10px 12px', borderRadius: 2, border: '1px solid var(--border)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', background: 'var(--bg-elevated)' }} />
          </div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
            <div style={{ flex: 1 }}>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, marginBottom: 4 }}>DATE</label>
              <input type="date" value={formDate} onChange={e => setFormDate(e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 2, border: '1px solid var(--border)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', background: 'var(--bg-elevated)' }} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ display: 'block', fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, marginBottom: 4 }}>TIME</label>
              <input type="time" value={formTime} onChange={e => setFormTime(e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 2, border: '1px solid var(--border)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', background: 'var(--bg-elevated)' }} />
            </div>
          </div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ display: 'block', fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, marginBottom: 4 }}>LOCATION</label>
            <input value={formLocation} onChange={e => setFormLocation(e.target.value)} placeholder="Optional" style={{ width: '100%', padding: '10px 12px', borderRadius: 2, border: '1px solid var(--border)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', background: 'var(--bg-elevated)' }} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: 'block', fontSize: 11, color: 'var(--text-muted)', fontWeight: 600, letterSpacing: 0.5, marginBottom: 4 }}>DESCRIPTION</label>
            <textarea value={formDesc} onChange={e => setFormDesc(e.target.value)} placeholder="Optional notes..." rows={3} style={{ width: '100%', padding: '10px 12px', borderRadius: 2, border: '1px solid var(--border)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', background: 'var(--bg-elevated)', resize: 'vertical' }} />
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={() => setShowForm(false)} style={{ flex: 1, padding: '12px', borderRadius: 2, border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-secondary)', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>Cancel</button>
            <button onClick={handleCreate} style={{ flex: 1, padding: '12px', borderRadius: 2, border: 'none', background: formName.trim() ? 'var(--surface-dark)' : 'var(--bg-secondary)', color: formName.trim() ? 'var(--accent)' : 'var(--text-dim)', fontWeight: 700, fontSize: 14, cursor: formName.trim() ? 'pointer' : 'default' }}>Create</button>
          </div>
        </div>
      )}

      {!showForm && (
        <div onClick={() => setShowForm(true)} style={{ position: 'fixed', bottom: 80, right: 'calc(50% - 175px)', width: 52, height: 52, borderRadius: 2, background: 'var(--surface-dark)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 4px 16px rgba(0,0,0,0.2)', zIndex: 10 }}>
          <span style={{ color: 'var(--accent)', fontSize: 26, fontWeight: 300, lineHeight: 1 }}>+</span>
        </div>
      )}
    </div>
  );
}
